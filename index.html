<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vamos sair?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}


body{

    min-height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(-45deg,#ff4d6d,#ff8fa3,#ffc2d1,#ff758f);
    background-size:400% 400%;

    animation:fundo 12s ease infinite;

}


@keyframes fundo{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}



.card{
  
  position: relative;
z-index: 10;

    width:90%;
    max-width:500px;

    padding:35px 20px;

    background:rgba(255,255,255,.18);

    backdrop-filter:blur(15px);

    border-radius:25px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.25);

}



h1{

    color:white;

    font-size:clamp(30px,8vw,50px);

    margin-bottom:35px;

    text-shadow:2px 2px 10px black;

}



.botoes{

    position:relative;

    height:150px;

    width:100%;

}



button{

    border:none;

    border-radius:50px;

    padding:16px 35px;

    font-size:20px;

    font-weight:bold;

    cursor:pointer;

}



#sim{
  
 

    position:absolute;

    left:50%;

    top:10%;

    transform:translate(-50%,-50%);

    background:#2ecc71;

    color:white;

    z-index:3;

    animation:pulsar 1.4s infinite;

}



@keyframes pulsar{

50%{

transform:translate(-50%,-50%) scale(1.08);

}

}



#nao{

    position:absolute;

    background:#e74c3c;

    color:white;

    z-index:2;

    transition:.25s ease;

}


  .coracao{
    position: fixed;
    color: #ff2d55;
    pointer-events: none;
    animation: cair linear forwards;
    z-index: 1;
}
  

@keyframes cair{

from{

transform:translateY(-50px);

opacity:1;

}

to{

transform:translateY(110vh);

opacity:0;

}

}



#mensagem{

margin-top:20px;

color:white;

font-size:24px;

font-weight:bold;

}


</style>

</head>


<body>


<div class="card">


<h1>Vamos sair ? </h1>


<div class="botoes">


<button id="sim">
SIM 
</button>


<button id="nao">
NÃO 😅
</button>


</div>


<div id="mensagem"></div>


</div>



<script>


const btnNao=document.getElementById("nao");

const area=document.querySelector(".botoes");

const btnSim=document.getElementById("sim");



const frases=[

"Tem certeza? 🤔",

"Pensa bem 😂",

"Vai perder essa? 😅",

"Clique no SIM pfv ❤️",

"Não adianta 😜",

"Quase! 😂",
  
  "Desista!", 
  
  "CHEGA", 

"Você não consegue 😆"

];



let centroX;

let centroY;



function atualizarCentro(){

centroX =
btnSim.offsetLeft +
(btnSim.offsetWidth/2);


centroY =
btnSim.offsetTop +
(btnSim.offsetHeight/2);

}



function fugir(){


atualizarCentro();


const distanciaMinima=120;

const distanciaMaxima=150;


let angulo=
Math.random()*Math.PI*2;



let distancia=
distanciaMinima+
Math.random()*
(distanciaMaxima-distanciaMinima);



let novoX =
centroX +
Math.cos(angulo)*distancia -
(btnNao.offsetWidth/2);



let novoY =
centroY +
Math.sin(angulo)*distancia -
(btnNao.offsetHeight/2);




// limite da área

novoX=Math.max(
0,
Math.min(
novoX,
area.offsetWidth-btnNao.offsetWidth
)
);


novoY=Math.max(
0,
Math.min(
novoY,
area.offsetHeight-btnNao.offsetHeight
)
);



btnNao.style.left=
novoX+"px";


btnNao.style.top=
novoY+"px";



btnNao.innerText=
frases[Math.floor(Math.random()*frases.length)];

}



window.onload=function(){

// posição inicial

btnNao.style.left="65%";

btnNao.style.top="50%";

btnNao.style.transform="translateY(-50%)";

};



btnNao.addEventListener(
"mouseenter",
fugir
);



btnNao.addEventListener(
"touchstart",
function(e){

e.preventDefault();

fugir();

}

);




function criarCoracao(){

const c=document.createElement("div");

c.className="coracao";

c.innerHTML="❤️";


c.style.left=
Math.random()*100+"vw";


c.style.fontSize=
(15+Math.random()*25)+"px";


c.style.animationDuration=
(3+Math.random()*4)+"s";


document.body.appendChild(c);



setTimeout(()=>{

c.remove();

},7000);

}



setInterval(criarCoracao,250);





document.getElementById("sim").onclick=function(){


document.getElementById("mensagem").innerHTML=
"🥰 Sabia que você aceitaria!";


for(let i=0;i<80;i++){

setTimeout(criarCoracao,i*20);

}



setTimeout(()=>{


window.location.href=
"https://wa.me/5514996236447?text=Oi!%20Aceitei%20o%20convite!%20❤️";


},1800);


};



</script>


</body>
</html>

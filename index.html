<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Vamos sair?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff4d6d,#ff8fa3,#ffc2d1,#ff758f);
    background-size:400% 400%;
    animation:fundo 12s ease infinite;
}

@keyframes fundo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(18px);
    padding:45px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
    animation:entrada 1s;
}

@keyframes entrada{
    from{
        transform:scale(.4);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

h1{
    color:#fff;
    font-size:3em;
    margin-bottom:35px;
    text-shadow:2px 2px 10px black;
}

.botoes{
    display:flex;
    gap:20px;
    justify-content:center;
}

button{
    border:none;
    border-radius:50px;
    padding:16px 40px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
}

#sim{
    background:#2ecc71;
    color:white;
    animation:pulsar 1.4s infinite;
}

@keyframes pulsar{
    50%{
        transform:scale(1.08);
    }
}

#sim:hover{
    transform:scale(1.2);
    box-shadow:0 0 20px #2ecc71,
               0 0 40px #2ecc71,
               0 0 70px #2ecc71;
}

#nao{
    background:#e74c3c;
    color:white;
    position:relative;
}

.coracao{
    position:fixed;
    color:#ff2d55;
    font-size:24px;
    animation:cair linear forwards;
    pointer-events:none;
}

@keyframes cair{
    from{
        transform:translateY(-50px);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

#mensagem{
    margin-top:25px;
    color:white;
    font-size:26px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<h1>💖 Vamos sair? 💖</h1>

<div class="botoes">

<button id="sim">SIM ❤️</button>

<button id="nao">NÃO 😅</button>

</div>

<div id="mensagem"></div>

</div>

<script>

const btnNao=document.getElementById("nao");

const frases=[
"Tem certeza? 🤔",
"Pensa bem 😂",
"Vai perder essa? 😅",
"Clique no SIM ❤️",
"Nem tenta 😜",
"Quase! 😂",
"Você não consegue 😆"
];

let velocidade=1;

function fugir(){

const largura=window.innerWidth-btnNao.offsetWidth;
const altura=window.innerHeight-btnNao.offsetHeight;

btnNao.style.position="fixed";
btnNao.style.left=Math.random()*largura+"px";
btnNao.style.top=Math.random()*altura+"px";

btnNao.innerText=frases[Math.floor(Math.random()*frases.length)];

velocidade+=0.3;

}

btnNao.addEventListener("mouseover",fugir);

btnNao.addEventListener("mousemove",fugir);

btnNao.addEventListener("touchstart",function(e){
e.preventDefault();
fugir();
});

function criarCoracao(){

const c=document.createElement("div");

c.className="coracao";

c.innerHTML="❤️";

c.style.left=Math.random()*100+"vw";

c.style.animationDuration=(3+Math.random()*4)+"s";

c.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(c);

setTimeout(()=>c.remove(),7000);

}

setInterval(criarCoracao,250);

document.getElementById("sim").onclick=function(){

document.getElementById("mensagem").innerHTML="🥰 Sabia que você aceitaria!";

for(let i=0;i<80;i++){

setTimeout(criarCoracao,i*20);

}

setTimeout(()=>{

window.location.href="https://wa.me/5514996236447?text=Oi!%20Aceitei%20o%20convite!%20❤️";

},1800);

};

</script>

</body>
</html>

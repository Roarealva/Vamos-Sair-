<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vamos sair?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4d6d,#ff758f,#ffc2d1);
}

.card{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    padding:50px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
    position:relative;
}

h1{
    color:white;
    font-size:3em;
    margin-bottom:40px;
    text-shadow:2px 2px 10px rgba(0,0,0,.3);
}

.botoes{
    display:flex;
    justify-content:center;
    gap:25px;
    position:relative;
    height:80px;
}

button{
    border:none;
    cursor:pointer;
    font-size:1.3em;
    padding:15px 40px;
    border-radius:40px;
    transition:.25s;
    font-weight:bold;
}

#sim{
    background:#2ecc71;
    color:white;
    box-shadow:0 0 15px rgba(46,204,113,.5);
}

#sim:hover{
    transform:scale(1.15);
    box-shadow:
        0 0 15px #2ecc71,
        0 0 35px #2ecc71,
        0 0 60px #2ecc71;
}

#nao{
    background:#e74c3c;
    color:white;
    position:absolute;
    left:55%;
    top:0;
}
</style>
</head>
<body>

<div class="card">
    <h1>💖 Vamos sair?</h1>

    <div class="botoes">
        <button id="sim">Sim ❤️</button>
        <button id="nao">Não 😅</button>
    </div>
</div>

<script>
const btnNao = document.getElementById("nao");

function fugir(){

    const margem = 20;

    const largura = window.innerWidth - btnNao.offsetWidth - margem;
    const altura = window.innerHeight - btnNao.offsetHeight - margem;

    const x = Math.random() * largura;
    const y = Math.random() * altura;

    btnNao.style.position = "fixed";
    btnNao.style.left = x + "px";
    btnNao.style.top = y + "px";
}

btnNao.addEventListener("mouseover", fugir);
btnNao.addEventListener("touchstart", function(e){
    e.preventDefault();
    fugir();
});

document.getElementById("sim").addEventListener("click", function(){
    window.open(
        "https://wa.me/5514996236447?text=Oi!%20Aceitei%20o%20convite!%20😊",
        "_blank"
    );
});
</script>

</body>
</html>

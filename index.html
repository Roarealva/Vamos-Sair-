<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Vamos sair?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    overflow:hidden;
    min-height:100vh;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(-45deg,#ff4d6d,#ff8fa3,#ffc2d1,#ff758f);
    background-size:400% 400%;
    animation:fundo 12s ease infinite;
}


@keyframes fundo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}


.card{

    width:90%;
    max-width:500px;

    background:rgba(255,255,255,.15);
    backdrop-filter:blur(18px);

    padding:30px 20px;

    border-radius:25px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.25);

    animation:entrada 1s;

}


@keyframes entrada{

from{
    transform:scale(.4);
    opacity:0;
}

to{
    transform:scale(1);
    opacity:1;
}

}


h1{

    color:white;

    font-size:clamp(1.8rem,8vw,3em);

    margin-bottom:35px;

    text-shadow:2px 2px 10px black;

}



.botoes{

    display:flex;

    gap:20px;

    justify-content:center;

    flex-wrap:wrap;

}



button{

    border:none;

    border-radius:50px;

    padding:16px 35px;

    font-size:20px;

    font-weight:bold;

    cursor:pointer;

    transition:.25s;

}



#sim{

    background:#2ecc71;

    color:white;

    animation:pulsar 1.4s infinite;

}



@keyframes pulsar{

50%{

transform:scale(1.08);

}

}



#sim:hover{

transform:scale(1.2);

box-shadow:
0 0 20px #2ecc71,
0 0 40px #2ecc71,
0 0 70px #2ecc71;

}



#nao{

    background:#e74c3c;

    color:white;

    position:relative;

}



.coracao{

    position:fixed;

    color:#ff2d55;

    font-size:24px;

    animation:cair linear forwards;

    pointer-events:none;

}



@keyframes cair{

from{

transform:translateY(-50px);

opacity:1;

}

to{

transform:translateY(110vh);

opacity:0;

}

}



#mensagem{

margin-top:25px;

color:white;

font-size:clamp(18px,5vw,26px);

font-weight:bold;

}



</style>

</head>


<body>


<div class="card">


<h1>💖 Vamos sair? 💖</h1>


<div class="botoes">


<button id="sim">
SIM ❤️
</button>


<button id="nao">
NÃO 😅
</button>


</div>


<div id="mensagem"></div>


</div>



<script>


const btnNao=document.getElementById("nao");


const frases=[

"Tem certeza? 🤔",

"Pensa bem 😂",

"Vai perder essa? 😅",

"Clique no SIM ❤️",

"Nem tenta 😜",

"Quase! 😂",

"Você não consegue 😆"

];



function fugir(){


const largura=window.innerWidth;

const altura=window.innerHeight;


const larguraBotao=btnNao.offsetWidth;

const alturaBotao=btnNao.offsetHeight;


const margem=20;



const novaPosicaoX =
Math.random() *
(largura - larguraBotao - margem);



const novaPosicaoY =
Math.random() *
(altura - alturaBotao - margem);



btnNao.style.position="fixed";


btnNao.style.left=
Math.max(margem,novaPosicaoX)+"px";


btnNao.style.top=
Math.max(margem,novaPosicaoY)+"px";



btnNao.innerText=
frases[Math.floor(Math.random()*frases.length)];


}



btnNao.addEventListener(
"mouseenter",
fugir
);



btnNao.addEventListener(
"touchstart",
function(e){

e.preventDefault();

fugir();

}

);



function criarCoracao(){


const c=document.createElement("div");


c.className="coracao";


c.innerHTML="❤️";


c.style.left=
Math.random()*100+"vw";


c.style.animationDuration=
(3+Math.random()*4)+"s";


c.style.fontSize=
(15+Math.random()*25)+"px";



document.body.appendChild(c);



setTimeout(()=>{

c.remove();

},7000);


}



setInterval(criarCoracao,250);





document.getElementById("sim").onclick=function(){



document.getElementById("mensagem").innerHTML=
"🥰 Sabia que você aceitaria!";



for(let i=0;i<80;i++){

setTimeout(criarCoracao,i*20);

}



setTimeout(()=>{


window.location.href=
"https://wa.me/5514996236447?text=Oi!%20Aceitei%20o%20convite!%20❤️";


},1800);



};



</script>


</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Vamos sair?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{

    min-height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(-45deg,#ff4d6d,#ff8fa3,#ffc2d1,#ff758f);
    background-size:400% 400%;
    animation:fundo 12s ease infinite;

}


@keyframes fundo{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}



.card{

    width:90%;
    max-width:500px;

    padding:35px 20px;

    background:rgba(255,255,255,.18);

    backdrop-filter:blur(15px);

    border-radius:25px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.25);

}



h1{

    color:white;

    font-size:clamp(30px,8vw,50px);

    margin-bottom:35px;

    text-shadow:2px 2px 10px black;

}



.botoes{

    position:relative;

    width:100%;

    height:180px;

}



button{

    border:none;

    border-radius:50px;

    padding:16px 35px;

    font-size:20px;

    font-weight:bold;

}



#sim{

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    background:#2ecc71;

    color:white;

    z-index:3;

    animation:pulsar 1.4s infinite;

}



@keyframes pulsar{

50%{

transform:translate(-50%,-50%) scale(1.08);

}

}



#nao{

    position:absolute;

    background:#e74c3c;

    color:white;

    z-index:2;

    transition:.25s ease;

}



.coracao{

    position:fixed;

    color:#ff2d55;

    pointer-events:none;

    animation:cair linear forwards;

}



@keyframes cair{

from{

transform:translateY(-50px);

opacity:1;

}

to{

transform:translateY(110vh);

opacity:0;

}

}



#mensagem{

margin-top:20px;

color:white;

font-size:24px;

font-weight:bold;

}


</style>

</head>


<body>


<div class="card">


<h1>💖 Vamos sair? 💖</h1>


<div class="botoes">


<button id="sim">
SIM ❤️
</button>


<button id="nao">
NÃO 😅
</button>


</div>


<div id="mensagem"></div>


</div>



<script>


const btnNao=document.getElementById("nao");
const btnSim=document.getElementById("sim");
const area=document.querySelector(".botoes");



const frases=[

"Tem certeza? 🤔",
"Pensa bem 😂",
"Vai perder essa? 😅",
"Clique no SIM ❤️",
"Nem tenta 😜",
"Quase! 😂",
"Você não consegue 😆"

];



let posicaoInicial;



function iniciar(){


posicaoInicial={

x:btnNao.offsetLeft,

y:btnNao.offsetTop

};


}



window.onload=iniciar;



function fugir(){


const limiteCard=area.getBoundingClientRect();

const simBox=btnSim.getBoundingClientRect();

const naoWidth=btnNao.offsetWidth;

const naoHeight=btnNao.offsetHeight;



let novaX;
let novaY;



let tentativas=0;



do{


let distancia=120+Math.random()*50;

let angulo=Math.random()*Math.PI*2;



let centroSimX=
simBox.left+simBox.width/2;


let centroSimY=
simBox.top+simBox.height/2;



novaX =
centroSimX+
Math.cos(angulo)*distancia-
limiteCard.left-
naoWidth/2;



novaY =
centroSimY+
Math.sin(angulo)*distancia-
limiteCard.top-
naoHeight/2;



tentativas++;



}

while(

(

Math.abs(novaX-btnSim.offsetLeft)<90 &&

Math.abs(novaY-btnSim.offsetTop)<70

)

&& tentativas <100

);



// trava dentro da div

novaX=Math.max(
0,
Math.min(
novaX,
area.offsetWidth-naoWidth
)
);



novaY=Math.max(
0,
Math.min(
novaY,
area.offsetHeight-naoHeight
)
);



btnNao.style.left=novaX+"px";

btnNao.style.top=novaY+"px";



btnNao.innerText=
frases[Math.floor(Math.random()*frases.length)];

}



btnNao.addEventListener(
"mouseenter",
fugir
);



btnNao.addEventListener(
"touchstart",
function(e){

e.preventDefault();

fugir();

}

);




function criarCoracao(){


const c=document.createElement("div");

c.className="coracao";

c.innerHTML="❤️";


c.style.left=Math.random()*100+"vw";


c.style.fontSize=
15+Math.random()*25+"px";


c.style.animationDuration=
3+Math.random()*4+"s";



document.body.appendChild(c);



setTimeout(()=>c.remove(),7000);


}



setInterval(criarCoracao,250);





document.getElementById("sim").onclick=function(){


document.getElementById("mensagem").innerHTML=
"🥰 Sabia que você aceitaria!";


for(let i=0;i<80;i++){

setTimeout(criarCoracao,i*20);

}



setTimeout(()=>{

window.location.href=
"https://wa.me/5514996236447?text=Oi!%20Aceitei%20o%20convite!%20❤️";

},1800);



};


</script>


</body>
</html>
